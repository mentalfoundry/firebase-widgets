<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #b8d4f0;
      --font: 'VT323', monospace;
      --size: 13px;
      --tracking: 0.06em;
    }
    [data-theme="paper"] { --text: #2a2a2a; --font: Georgia, serif;        --size: 12px; --tracking: 0.03em; }
    [data-theme="dusk"]  { --text: #ddc8f5; --font: system-ui, sans-serif; --size: 12px; --tracking: 0.03em; }
    [data-theme="moss"]  { --text: #a8c8a0; --font: system-ui, sans-serif; --size: 12px; --tracking: 0.03em; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: transparent;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
    }
    #count {
      font-family: var(--font);
      font-size: var(--size);
      letter-spacing: var(--tracking);
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
      transition: opacity 0.3s;
    }
    #count.loading { opacity: 0.3; }
  </style>
</head>
<body>
  <span id="count" class="loading">------</span>

  <script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    document.documentElement.dataset.theme = new URLSearchParams(location.search).get('theme') || 'cyber';

    const firebaseConfig = {
      apiKey:            "AIzaSyBjXZMCTEd7yyWzkhzlvwZmiJbPN6lP88Q",
      authDomain:        "daznet.firebaseapp.com",
      projectId:         "daznet",
      storageBucket:     "daznet.appspot.com",
      messagingSenderId: "253374160314",
      appId:             "1:253374160314:web:098d00c868f0ff1b991183",
      measurementId:     "G-G4005VFWZ6"
    };

    const app        = initializeApp(firebaseConfig);
    const db         = getFirestore(app);
    const counterRef = doc(db, 'counters', 'visitors');
    const countEl    = document.getElementById('count');

    async function run() {
      try {
        if (!sessionStorage.getItem('visit_counted')) {
          try {
            await updateDoc(counterRef, { count: increment(1) });
          } catch (e) {
            await setDoc(counterRef, { count: 1 });
          }
          sessionStorage.setItem('visit_counted', '1');
        }
        const snap = await getDoc(counterRef);
        if (snap.exists()) {
          countEl.textContent = String(snap.data().count).padStart(6, '0');
          countEl.classList.remove('loading');
        }
      } catch (err) {
        console.error('Counter error:', err);
        countEl.textContent = 'ERR';
        countEl.classList.remove('loading');
      }
    }

    run();
  </script>
</body>
</html>
