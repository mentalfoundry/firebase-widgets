<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           rgba(0, 0, 0, 0.82);
      --border:       rgba(184, 212, 240, 0.2);
      --border-focus: rgba(184, 212, 240, 0.6);
      --text:         #b8d4f0;
      --accent:       #7eb8e8;
      --input-bg:     rgba(184, 212, 240, 0.05);
      --input-border: rgba(184, 212, 240, 0.25);
      --btn-hover:    rgba(184, 212, 240, 0.12);
      --scrollbar:    rgba(184, 212, 240, 0.2);
      --divider:      rgba(184, 212, 240, 0.08);
      --font:         'VT323', monospace;
      --size:         14px;
    }
    [data-theme="paper"] {
      --bg:           rgba(250, 247, 242, 0.96);
      --border:       rgba(0, 0, 0, 0.1);
      --border-focus: rgba(0, 0, 0, 0.4);
      --text:         #2a2a2a;
      --accent:       #5a3e28;
      --input-bg:     rgba(0, 0, 0, 0.03);
      --input-border: rgba(0, 0, 0, 0.15);
      --btn-hover:    rgba(0, 0, 0, 0.06);
      --scrollbar:    rgba(0, 0, 0, 0.15);
      --divider:      rgba(0, 0, 0, 0.08);
      --font:         Georgia, serif;
      --size:         13px;
    }
    [data-theme="dusk"] {
      --bg:           rgba(18, 10, 28, 0.88);
      --border:       rgba(200, 150, 255, 0.2);
      --border-focus: rgba(200, 150, 255, 0.6);
      --text:         #ddc8f5;
      --accent:       #c084fc;
      --input-bg:     rgba(200, 150, 255, 0.05);
      --input-border: rgba(200, 150, 255, 0.25);
      --btn-hover:    rgba(200, 150, 255, 0.12);
      --scrollbar:    rgba(200, 150, 255, 0.2);
      --divider:      rgba(200, 150, 255, 0.08);
      --font:         system-ui, sans-serif;
      --size:         13px;
    }
    [data-theme="moss"] {
      --bg:           rgba(8, 18, 10, 0.88);
      --border:       rgba(140, 200, 120, 0.2);
      --border-focus: rgba(140, 200, 120, 0.6);
      --text:         #a8c8a0;
      --accent:       #6db87a;
      --input-bg:     rgba(140, 200, 120, 0.05);
      --input-border: rgba(140, 200, 120, 0.25);
      --btn-hover:    rgba(140, 200, 120, 0.12);
      --scrollbar:    rgba(140, 200, 120, 0.2);
      --divider:      rgba(140, 200, 120, 0.08);
      --font:         system-ui, sans-serif;
      --size:         13px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: transparent;
      font-family: var(--font);
      font-size: var(--size);
      color: var(--text);
    }

    #widget {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    #entries {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry { border-bottom: 1px solid var(--divider); padding-bottom: 8px; }
    .entry:last-child { border-bottom: none; padding-bottom: 0; }

    .entry-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
    .entry-name   { color: var(--accent); }
    .entry-date   { opacity: 0.35; font-size: 12px; }
    .entry-message { line-height: 1.4; word-break: break-word; opacity: 0.85; }

    #footer { border-top: 1px solid var(--border); padding: 6px 8px; }

    #input-row { display: flex; gap: 4px; }

    input, button {
      font-family: var(--font);
      font-size: var(--size);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      padding: 3px 6px;
      outline: none;
    }

    input::placeholder { opacity: 0.35; }
    input:focus { border-color: var(--border-focus); }

    #name-input    { width: 90px; flex-shrink: 0; }
    #message-input { flex: 1; min-width: 0; }

    button {
      cursor: pointer;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    button:hover:not(:disabled) { background: var(--btn-hover); }
    button:disabled { opacity: 0.35; cursor: default; }

    #signed-notice {
      opacity: 0.4;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-align: center;
      padding: 2px 0;
    }

    #entries::-webkit-scrollbar       { width: 3px; }
    #entries::-webkit-scrollbar-track { background: transparent; }
    #entries::-webkit-scrollbar-thumb { background: var(--scrollbar); }
  </style>
</head>
<body>
  <div id="widget">
    <div id="entries"></div>
    <div id="footer">
      <div id="input-row">
        <input id="name-input" placeholder="name" maxlength="50" autocomplete="off" spellcheck="false">
        <input id="message-input" placeholder="leave a message..." maxlength="500" autocomplete="off">
        <button id="sign-btn">SIGN</button>
      </div>
      <div id="signed-notice" style="display:none;">you have already signed ✦</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    document.documentElement.dataset.theme = new URLSearchParams(location.search).get('theme') || 'cyber';

    const firebaseConfig = {
      apiKey:            "AIzaSyBjXZMCTEd7yyWzkhzlvwZmiJbPN6lP88Q",
      authDomain:        "daznet.firebaseapp.com",
      projectId:         "daznet",
      storageBucket:     "daznet.appspot.com",
      messagingSenderId: "253374160314",
      appId:             "1:253374160314:web:098d00c868f0ff1b991183"
    };

    const app       = initializeApp(firebaseConfig);
    const db        = getFirestore(app);
    const entriesEl = document.getElementById('entries');
    const nameEl    = document.getElementById('name-input');
    const messageEl = document.getElementById('message-input');
    const signBtn   = document.getElementById('sign-btn');
    const noticeEl  = document.getElementById('signed-notice');
    const inputRow  = document.getElementById('input-row');

    nameEl.value = localStorage.getItem('guestbook_name') || '';
    if (localStorage.getItem('guestbook_signed')) {
      inputRow.style.display = 'none';
      noticeEl.style.display = 'block';
    }

    const q = query(collection(db, 'guestbook'), orderBy('timestamp', 'desc'), limit(100));

    onSnapshot(q, (snap) => {
      entriesEl.innerHTML = '';
      snap.forEach(docSnap => {
        const { name, message, timestamp } = docSnap.data();
        const date = timestamp
          ? new Date(timestamp.seconds * 1000).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' })
          : '—';
        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
          <div class="entry-header">
            <span class="entry-name">${esc(name)}</span>
            <span class="entry-date">${date}</span>
          </div>
          <div class="entry-message">${esc(message)}</div>`;
        entriesEl.appendChild(div);
      });
    });

    async function sign() {
      const name    = nameEl.value.trim();
      const message = messageEl.value.trim();
      if (!name || !message) return;

      signBtn.disabled = true;
      localStorage.setItem('guestbook_name', name);

      try {
        await addDoc(collection(db, 'guestbook'), { name, message, timestamp: serverTimestamp() });
        localStorage.setItem('guestbook_signed', '1');
        inputRow.style.display = 'none';
        noticeEl.style.display = 'block';
      } catch {
        signBtn.disabled = false;
      }
    }

    signBtn.addEventListener('click', sign);
    messageEl.addEventListener('keydown', e => { if (e.key === 'Enter') sign(); });

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
