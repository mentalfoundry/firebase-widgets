<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     rgba(0, 0, 0, 0.55);
      --border: rgba(184, 212, 240, 0.2);
      --text:   #b8d4f0;
      --font:   'VT323', monospace;
      --size:   14px;
    }
    [data-theme="paper"] {
      --bg:     rgba(250, 247, 242, 0.96);
      --border: rgba(0, 0, 0, 0.1);
      --text:   #2a2a2a;
      --font:   Georgia, serif;
      --size:   13px;
    }
    [data-theme="dusk"] {
      --bg:     rgba(18, 10, 28, 0.88);
      --border: rgba(200, 150, 255, 0.2);
      --text:   #ddc8f5;
      --font:   system-ui, sans-serif;
      --size:   13px;
    }
    [data-theme="moss"] {
      --bg:     rgba(8, 18, 10, 0.88);
      --border: rgba(140, 200, 120, 0.2);
      --text:   #a8c8a0;
      --font:   system-ui, sans-serif;
      --size:   13px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: transparent;
      font-family: var(--font);
      font-size: var(--size);
      color: var(--text);
    }

    #widget {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      height: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      line-height: 1.4;
      min-width: 0;
    }

    .label {
      flex-shrink: 0;
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.45;
    }

    a {
      color: var(--text);
      text-decoration: none;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    a:hover { text-decoration: underline; opacity: 0.8; }

    .loading { opacity: 0.3; }
    .error   { opacity: 0.4; font-size: 12px; }
  </style>
</head>
<body>
  <div id="widget">
    <div class="item">
      <span class="label">HN #1</span>
      <a id="hn1-link" class="loading" href="#" target="_blank" rel="noopener">loading...</a>
    </div>
    <div class="item">
      <span class="label">HN #2</span>
      <a id="hn2-link" class="loading" href="#" target="_blank" rel="noopener">loading...</a>
    </div>
  </div>

  <script type="module">
    document.documentElement.dataset.theme = new URLSearchParams(location.search).get('theme') || 'cyber';

    async function loadHN(index, elId) {
      const el = document.getElementById(elId);
      try {
        const ids  = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json').then(r => r.json());
        const item = await fetch(`https://hacker-news.firebaseio.com/v0/item/${ids[index]}.json`).then(r => r.json());
        el.textContent = item.title;
        el.href = item.url || `https://news.ycombinator.com/item?id=${item.id}`;
        el.classList.remove('loading');
      } catch {
        el.textContent = 'unavailable';
        el.classList.add('error');
        el.classList.remove('loading');
      }
    }

    loadHN(0, 'hn1-link');
    loadHN(1, 'hn2-link');
  </script>
</body>
</html>
